# Pilot configuration — JK Tyre BTP V1 forward scheduler
# Values here mirror the locked decisions in CLAUDE.md. Treat as the single
# source of truth for tunables; constants.py loads this at import time.

pilot:
  sku_code: "1325220516095HTMX0"
  sku_description: "205/65 R16 Passenger-Car Radial (Taxi MX TL)"
  green_tyre_code: "GT2056516TAXIMXTL"
  curing_press: "14811"            # string — leading zeros matter elsewhere (L23)
  horizon_start: "2026-05-17 06:49"
  horizon_end:   "2026-05-30 22:19"
  total_demand_tyres: 2620
  pre_existing_gt_inventory: 0

# L17 — t0 anchor.
#   When `auto: true` (default), the engine computes t0 from the actual
#   BOM depth + aging + per-item duration estimate at run start:
#     t0 = first_curing_start − critical_path − safety_buffer_min
#   This makes t0 a *data-driven* "earliest feasible production start"
#   rather than a hard-coded placeholder.
#   `default` is the fallback when `auto: false` or when the auto compute
#   somehow returns a non-positive critical path.
t0:
  auto: true
  safety_buffer_min: 60
  default: "2026-05-01 07:00"
  guardrail_assertion: true        # HALT if t0 + sum(MIN_aging) along longest path > first_curing_start

# L10 / L20 — efficiency factor, single ceil rounding direction.
efficiency:
  factor: 0.95

# Soft-rule defaults (Section 6, V1 settings)
defaults:
  transfer_time_min: 10            # Section 9 finding #3 — fallback when null in routing
  changeover_min_v1: 0             # L8 — V1 sets changeover to 0 always

# L3 / L18 — Tyre Building pinning. V1 deterministic primary = lowest in pool.
building:
  pool: ["6001", "6002", "6003", "6004", "7001", "7002", "7003", "7004"]
  primary: "6001"                  # spill to next-lowest only on aging-MAX breach
  tyres_per_cycle: 2               # Each VMIMaxx cycle produces 2 green tyres

# L12 — Capstrip chain. REVERSED by planner on 2026-05-28: the latest aging
# dataset resolved the CAP 66 - CAPSTRIP 24h/48h conflict, naming is
# standardised to "Capstrip", and the chain is now in scope. Exclusion list
# left empty so the engine schedules the full Capstrip chain.
# (Pre Cap Strip / CAP 66-MOTHERROLL still has no MPQ row → it lot-sizes as a
#  single un-split mother roll until the planner supplies an MPQ.)
exclusions:
  capstrip_items: []

# L13 — Work-Away reclaim/scrap inputs. Treated as already available.
work_away_items:
  - "IL3 WA"
  - "JT444WA"
  - "HS106 WA"
  - "T4004WA"

# Output run-id format. (HHMM-DD-MM-YYYY)
output:
  run_id_format: "%H%M-%d-%m-%Y"
  root: "output"

# 9 in-scope Green-Tyre components (the AND-join set for Building lots).
# CAP 66 - CAPSTRIP added 2026-05-28 when L12 was reversed (Capstrip in scope).
green_tyre_components:
  - "CPJ1218-162MM/29°"
  - "CPJ1218-154MM/29°-1"
  - "TRD2056516TAXIMXTL"
  - "IL2056516TAXIMXTL"
  - "SSW2056516TAXIMXTL"
  - "EHT1000-640MM/90°"
  - "EHT1000 -480MM/90°"
  - "BD-12843443-4"
  - "CAP 66 - CAPSTRIP"
